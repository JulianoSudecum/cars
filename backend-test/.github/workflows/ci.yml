name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cars
          POSTGRES_PASSWORD: cars
          POSTGRES_DB: cars
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cars"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://cars:cars@localhost:5432/cars
      TEST_DATABASE_URL: postgresql+asyncpg://cars:cars@localhost:5432/cars_test
      JWT_SECRET: ci-secret-com-no-minimo-32-bytes-aaaaaaaaaa
      ANTHROPIC_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Validar migrations (alembic upgrade head)
        run: alembic upgrade head

      - name: Testes (pytest)
        run: pytest -q
