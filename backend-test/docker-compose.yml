services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cars}
      POSTGRES_DB: ${POSTGRES_DB:-cars}
    ports:
      # Porta exposta no host (default 5433 para não colidir com um Postgres local na 5432).
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cars} -d ${POSTGRES_DB:-cars}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Dentro da rede do compose o host do banco é o serviço "db".
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cars}:${POSTGRES_PASSWORD:-cars}@db:5432/${POSTGRES_DB:-cars}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
